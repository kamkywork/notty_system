<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบติดตามยอด - Collection System</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* CSS Style - Maroon Theme (No Black, No Green, No Orange) */
        :root { 
            --primary: #800000;   /* แดงเลือดหมูหลัก */
            --secondary: #4d0000; /* แดงเลือดหมูเข้ม */
            --success: #0097e6;   /* ฟ้า/น้ำเงิน */
            --warning: #8c7ae6;   /* ม่วง */
            --danger: #b30000;    /* แดงเลือดหมูสว่าง */
            --dark: #330000;      /* แดงเลือดหมูเข้มมาก (แทนสีดำ) */
            --light: #f8f9fa; 
            --gray: #7f8fa6;      /* เทากลาง */
            --bg: #f4f6f8; 
            --card-radius: 16px; 
        }
        
        body { 
            font-family: 'Sarabun', sans-serif; 
            /* สีแดงเลือดหมูไล่เฉด */
            background: linear-gradient(135deg, #2b0000 0%, #660000 50%, #a30000 100%); 
            background-attachment: fixed;
            margin: 0; padding: 0; 
            color: var(--dark); 
            -webkit-font-smoothing: antialiased; 
        }

        /* Sidebar Menu Styles */
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #ffffff; box-shadow: 4px 0 20px rgba(43,0,0,0.3); z-index: 9999; transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px 20px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .sidebar.active { left: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(43,0,0,0.5); backdrop-filter: blur(2px); z-index: 9998; display: none; opacity: 0; transition: opacity 0.3s; }
        .sidebar-overlay.active { display: block; opacity: 1; }
        
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #e6b3b3; padding-bottom: 15px; }
        .sidebar-header h3 { margin: 0; color: var(--primary); font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .btn-close-sidebar { background: none; border: none; font-size: 20px; color: var(--gray); cursor: pointer; transition: 0.2s; }
        .btn-close-sidebar:hover { color: var(--danger); transform: scale(1.1); }
        
        .sidebar-btn { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: transparent; border: 1px solid transparent; border-radius: 12px; color: var(--dark); font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; width: 100%; text-align: left; }
        .sidebar-btn:hover { background: #faf0f0; border-color: #e6b3b3; color: var(--primary); transform: translateX(5px); }
        .sidebar-btn i { width: 22px; text-align: center; color: var(--primary); font-size: 18px; }
        .sidebar-btn.logout { margin-top: auto; background: #fff0f0; color: var(--danger); border-color: #ffd6d6; }
        .sidebar-btn.logout:hover { background: #ffebeb; color: var(--danger); }
        .sidebar-btn.logout i { color: var(--danger); }

        /* Header Styles */
        .header { background: rgba(255, 255, 255, 0.98); padding: 15px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(43,0,0,0.15); border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .menu-toggle { font-size: 24px; color: var(--primary); cursor: pointer; background: none; border: none; padding: 0; margin-right: 10px; transition: 0.2s; display: flex; align-items: center; }
        .menu-toggle:active { transform: scale(0.9); }
        #appTitle { margin: 0; font-size: 18px !important; font-weight: 700; color: var(--primary) !important; display: flex; align-items: center; gap: 8px; }
        
        .tools-bar { display: flex; gap: 10px; align-items: center; justify-content: space-between; }
        .search-box-group { display: flex; align-items: center; background: #f4f6f8; border: 1px solid #e0e6ed; border-radius: 12px; padding: 4px 12px; flex-grow: 1; transition: 0.3s; }
        .search-box-group:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(128, 0, 0, 0.1); background: #fff; }
        .search-input { width: 100%; border: none; background: transparent; padding: 8px 0; color: var(--dark); font-family: 'Sarabun'; outline: none; font-size: 14px; }
        .btn-search-icon { color: var(--primary); cursor: pointer; padding: 5px; }
        
        .date-input { border: 1px solid #e0e6ed; background: #f4f6f8; padding: 8px 12px; border-radius: 12px; font-family: 'Sarabun'; color: var(--dark); outline: none; transition: 0.3s; width: 120px; }
        .date-input:focus { border-color: var(--primary); background: #fff; }
        .btn-refresh { background: var(--primary); color: white; border: none; border-radius: 12px; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(128,0,0,0.2); transition: 0.2s; flex-shrink: 0; font-size: 16px; }
        .btn-refresh:active { transform: scale(0.95); }

        #contractListHeading, #searchResultTitle { color: #ffffff !important; text-shadow: 0 2px 4px rgba(43,0,0,0.4); margin-top: 20px; }
        .user-profile-badge { background: #faf0f0 !important; border: 1px solid #e6b3b3 !important; color: var(--primary) !important; font-size: 11px; padding: 4px 10px; border-radius: 15px; margin-left: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }

        /* Dashboard & Stat Cards */
        .perf-container { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        #adminDashboard { background: transparent !important; border: none !important; padding-bottom: 0; margin-bottom: -10px; }
        .stat-card { background: white; border-radius: var(--card-radius); padding: 20px; box-shadow: 0 6px 15px rgba(43,0,0,0.15); position: relative; overflow: hidden; border-left: 5px solid transparent; }
        .stat-header { display: flex; align-items: center; margin-bottom: 5px; font-weight: 600; color: var(--gray); gap: 10px; font-size: 13px; }
        .stat-body { text-align: center; padding: 5px 0; }
        .big-number { font-size: 36px; font-weight: 800; margin: 0; line-height: 1; letter-spacing: -1px; color: var(--dark); }
        .unit-text { font-size: 12px; color: var(--gray); font-weight: normal; margin-top: 5px; display: block; }

        /* Minimal Polygon Cards */
        .list-container { padding: 0 20px 80px 20px; max-width: 800px; margin: 0 auto; }
        .polygon-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; margin-top: 15px; }
        .polygon-card { 
            background: rgba(255,255,255,0.95); border-radius: 16px; padding: 15px; cursor: pointer; transition: all 0.3s ease; 
            text-align: center; box-shadow: 0 4px 15px rgba(43,0,0,0.1); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; min-height: 90px; border-bottom: 4px solid transparent;
        }
        .polygon-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(43,0,0,0.2); }
        .polygon-card:active { transform: scale(0.97); }
        
        .poly-bg-pending { border-bottom-color: var(--warning); }
        .poly-bg-pending .poly-count, .poly-bg-pending .poly-icon { color: var(--warning); }
        .poly-bg-normal { border-bottom-color: var(--primary); }
        .poly-bg-normal .poly-count, .poly-bg-normal .poly-icon { color: var(--primary); }
        .poly-bg-postpone { border-bottom-color: #9b59b6; }
        .poly-bg-postpone .poly-count, .poly-bg-postpone .poly-icon { color: #9b59b6; }
        .poly-bg-overdue { border-bottom-color: var(--danger); }
        .poly-bg-overdue .poly-count, .poly-bg-overdue .poly-icon { color: var(--danger); }
        
        .poly-count { font-size: 28px; font-weight: 700; line-height: 1; margin: 8px 0 4px 0; color: var(--dark); }
        .poly-title { font-size: 13px; font-weight: 500; color: var(--gray); }
        .poly-icon { font-size: 22px; }

        /* Customer Cards */
        .cust-card { border-radius: var(--card-radius); margin-bottom: 15px; box-shadow: 0 6px 15px rgba(43,0,0,0.15); position: relative; background: white; border-left: 4px solid var(--gray); transition: 0.2s; animation: slideDown 0.3s ease-out; }
        .card-postpone { background: #fdf5ff; border-left-color: #9b59b6; } 
        .card-overdue { background: #fff0f0; border-left-color: var(--danger); } 
        .card-pending-approve { background: #f4f6f8; border-left-color: var(--warning); } 
        .card-search-result { border-left-color: var(--primary); background: #faf0f0; }
        
        .cust-header { padding: 15px 15px 5px 15px; display: flex; justify-content: space-between; align-items: flex-start; }
        .cust-info h3 { margin: 0 0 4px 0; font-size: 17px; color: var(--dark); }
        .cust-id { font-size: 11px; color: var(--gray); background: rgba(128, 0, 0, 0.05); padding: 3px 8px; border-radius: 6px; display: inline-block; border: 1px solid rgba(128, 0, 0, 0.1); }
        
        .status-text { font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .text-blue { color: var(--success); } 
        .text-purple { color: var(--warning); cursor: pointer; text-decoration: underline; } 
        .text-darkpurple { color: #9b59b6; } 
        .text-red { color: var(--danger); }
        
        .btn-kebab { border: none; background: transparent; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--gray); }
        .cust-body { padding: 0 15px 15px 15px 15px; display: flex; justify-content: space-between; align-items: flex-end; }
        .contact-line { font-size: 13px; color: var(--gray); display: flex; align-items: center; gap: 6px; margin-top: 5px; }
        .amount-val { font-size: 22px; font-weight: 800; color: var(--dark); letter-spacing: -0.5px; }
        .cust-actions { padding: 10px 15px; background: rgba(255,255,255,0.5); border-top: 1px solid rgba(128, 0, 0, 0.05); display: grid; gap: 10px; border-bottom-left-radius: var(--card-radius); border-bottom-right-radius: var(--card-radius); }
        
        .btn-act, .user-checkbox-btn { border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; height: 42px; width: 100%; box-sizing: border-box; background: white; border: 1px solid #dfe6e9; color: var(--dark); transition: 0.2s; }
        .btn-act:active, .user-checkbox-btn:active { transform: scale(0.95); }
        .btn-act-call { color: var(--primary); } 
        .btn-act-contract { background: var(--dark); color: white; border:none; } 
        .btn-act-info { background: var(--success); color: white; border:none; } 
        .btn-act-pay { background: #6c5ce7; color: white; border:none; }
        .btn-act-postpone { color: #9b59b6; }
        .btn-disabled { background: #f4f6f8 !important; color: var(--gray) !important; border: 1px solid #e0e6ed !important; cursor: not-allowed !important; }
        
        .grid-admin-actions { grid-template-columns: 1fr 1fr 1fr 1fr; } .grid-user-actions { grid-template-columns: 1fr 1fr 1fr 1fr; } 
        .grid-closed-actions { grid-template-columns: 1fr 1fr; }
        @media (max-width: 600px) { .perf-container { grid-template-columns: 1fr; } .grid-admin-actions { grid-template-columns: 1fr 1fr; } .grid-user-actions { grid-template-columns: 1fr 1fr; } }
        
        .login-overlay { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: rgba(43, 0, 0, 0.95); z-index: 9000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px 40px; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(43,0,0,0.4); }
        .loading-state { text-align: center; padding: 40px; color: #fff; font-size: 15px; }
        @keyframes slideDown { from {opacity:0; transform:translateY(-10px);} to {opacity:1; transform:translateY(0);} }
        .swal2-file-input { font-size: 14px; margin-top: 10px; }
        
        .swal2-title { color: var(--dark) !important; }
        .swal2-content { color: var(--gray) !important; }
    </style>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#660000">	
</head>
<body>

    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-layer-group"></i> เมนูระบบ</h3>
            <button class="btn-close-sidebar" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        
        <button class="sidebar-btn" onclick="showAllContracts(); toggleSidebar();"><i class="fas fa-list"></i> ดูสัญญาทั้งหมด</button>
        <button class="sidebar-btn" onclick="showClosedContracts(); toggleSidebar();"><i class="fas fa-check-double"></i> ปิด/ครบ/ยกเลิก</button>
        <button id="btnExpense" class="sidebar-btn" style="display:none;" onclick="recordExpense(); toggleSidebar();"><i class="fas fa-file-invoice-dollar"></i> บันทึกรายจ่าย</button>
        <button id="btnShopReport" class="sidebar-btn" style="display:none;" onclick="showShopTransferReport(); toggleSidebar();"><i class="fas fa-money-bill-wave"></i> ยอดโอนร้าน</button>
        <button id="btnPrint" class="sidebar-btn" onclick="printReport(); toggleSidebar();"><i class="fas fa-print"></i> พิมพ์รายงาน</button>
        <button id="btnExcel" class="sidebar-btn" onclick="exportToExcel(); toggleSidebar();"><i class="fas fa-file-excel"></i> ส่งออก Excel</button>
        <button id="btnReset" class="sidebar-btn" onclick="resetHidden(); toggleSidebar();"><i class="fas fa-eye"></i> แสดงรายการที่ซ่อน</button>
        <button id="btnAdmin" class="sidebar-btn" style="display:none;" onclick="manageUsers(); toggleSidebar();"><i class="fas fa-users-cog"></i> จัดการผู้ใช้</button>
        
        <button id="btnLogout" class="sidebar-btn logout" style="display:none;" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</button>
    </div>

    <div id="loginOverlay" class="login-overlay" style="left:0;">
        <div class="login-box">
            <h2 style="color:var(--dark); margin-bottom:20px;">เข้าสู่ระบบ</h2>
            <input type="text" id="loginUser" class="date-input" style="width:100%; margin-bottom:15px; box-sizing:border-box;" placeholder="ชื่อผู้ใช้งาน">
            <input type="password" id="loginPass" class="date-input" style="width:100%; margin-bottom:15px; box-sizing:border-box;" placeholder="รหัสผ่าน" onkeyup="if(event.key==='Enter') doLogin()">
            <button style="background:var(--primary); width:100%; border:none; color:white; border-radius:12px; padding:12px; font-size:16px; font-weight:bold; cursor:pointer;" onclick="doLogin()">เข้าใช้งาน</button>
            <div id="loginMsg" style="color:var(--danger); margin-top:15px; font-size:13px; min-height:20px;"></div>
        </div>
    </div>

    <div class="header">
        <div class="header-top">
            <div style="display:flex; align-items:center;">
                <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <h2 id="appTitle">ระบบติดตามยอด</h2>
            </div>
            <div style="display:flex; gap:10px; align-items:center;" id="userBadgeContainer">
                </div>
        </div>
        <div class="tools-bar">
            <div class="search-box-group">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 ค้นหารายละเอียดสัญญา..." onkeyup="if(event.key==='Enter') doGlobalSearch()">
                <i class="fas fa-search btn-search-icon" onclick="doGlobalSearch()"></i>
            </div>
            <div style="display:flex; gap:8px;">
                <input type="date" id="filterDate" class="date-input" onchange="loadData()">
                <button class="btn-refresh" onclick="loadData()"><i class="fas fa-sync-alt"></i></button>
            </div>
        </div>
    </div>

    <div id="adminDashboard" class="perf-container" style="display:none;">
        <div id="boxCost" class="stat-card" style="border-left-color: var(--danger);">
            <div class="stat-header"><i class="fas fa-box-open" style="color:var(--danger)"></i> <span>ต้นทุนรวม (Cost)</span></div>
            <div class="stat-body"><h1 id="txtTotalCost" class="big-number" style="color:var(--danger); font-size:28px;">0</h1><span class="unit-text">บาท</span></div>
        </div>
        <div id="boxProfit" class="stat-card" style="border-left-color: var(--success);">
            <div class="stat-header"><i class="fas fa-chart-line" style="color:var(--success)"></i> <span>กำไรสุทธิ (Profit)</span></div>
            <div class="stat-body"><h1 id="txtNetProfit" class="big-number" style="color:var(--success); font-size:28px;">0</h1><span class="unit-text">บาท (ขาย - ทุน)</span></div>
        </div>
    </div>

    <div class="perf-container" id="statContainer">
        <div id="cardDaily" class="stat-card" style="border-left-color: var(--primary);">
            <div class="stat-header"><i class="fas fa-wallet" style="color:var(--primary)"></i> <span>ยอดเก็บได้วันนี้ (Daily)</span></div>
            <div class="stat-body"><h1 id="txtTodayCollected" class="big-number" style="color:var(--primary);">0</h1><span class="unit-text">บาท</span></div>
        </div>

        <div class="stat-card" style="border-left-color: var(--warning);">
            <div class="stat-header"><i class="fas fa-coins" style="color:var(--warning)"></i> <span>ค่าคอมมิชชั่น (20%)</span></div>
            <div class="stat-body"><h1 id="txtCommission" class="big-number" style="color:var(--warning);">0</h1><span class="unit-text">บาท (สะสมเดือนนี้)</span></div>
        </div>
    </div>

    <div class="list-container">
        <div id="searchResultTitle" style="display:none; margin-bottom:10px; font-weight:bold;">ผลการค้นหา: <span id="txtSearchKeyword"></span> <button onclick="clearSearch()" style="background:#fff; border:none; padding:4px 10px; border-radius:8px; cursor:pointer; font-size:12px; color:var(--danger); box-shadow:0 2px 5px rgba(43,0,0,0.1);">ล้างค้นหา</button></div>
        <div id="polygonContainer" class="polygon-grid"></div>
        <div id="contractListHeading" style="font-weight:bold; margin: 15px 0 5px 0; display:none;">▼ รายการสัญญา</div>
        <div id="contractList"></div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwSvSad7t7dTWGJ6GPrngr8biIXRnLx8UjUKbszwctwmIcKfhIx_etOy66u3nWgQug/exec'; 
        let currentUser = null;
        let currentTrackingData = [], filteredData = [], globalSummary = {};
        let contractGroups = { pending: [], normal: [], postpone: [], overdue: [] };
        let isSearchMode = false;

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('sidebarOverlay');
            sb.classList.toggle('active');
            if (sb.classList.contains('active')) {
                ov.style.display = 'block';
                setTimeout(() => ov.style.opacity = '1', 10);
            } else {
                ov.style.opacity = '0';
                setTimeout(() => ov.style.display = 'none', 300);
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => resolve(reader.result); reader.onerror = error => reject(error); });
        function linkify(text) { if (!text) return ''; const urlRegex = /(https?:\/\/[^\]\s]+)/g; return text.replace(urlRegex, function(url) { let downloadUrl = url; if(url.includes('drive.google.com') && url.includes('export=view')) { downloadUrl = url.replace('export=view', 'export=download'); } return `<span style="display:inline-flex; align-items:center; gap:4px; vertical-align:middle; margin-right:5px;"><a href="${url}" target="_blank" style="text-decoration:none; background:#e3f2fd; color:#1565c0; padding:2px 6px; border-radius:4px; font-size:11px; border:1px solid #90caf9;"><i class="fas fa-eye"></i> ดู</a><a href="${downloadUrl}" target="_blank" style="text-decoration:none; background:#ffebeb; color:var(--danger); padding:2px 6px; border-radius:4px; font-size:11px; border:1px solid #ffcccc;" title="บันทึกรูป"><i class="fas fa-save"></i></a></span>`; }); }

        window.onload = function() {
            const saved = localStorage.getItem('kamky_user');
            if (saved) { currentUser = JSON.parse(saved); initApp(); } 
            else { document.getElementById('filterDate').valueAsDate = new Date(); }
        };

        async function doLogin() {
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value.trim();
            const msg = document.getElementById('loginMsg');
            if(!u || !p) { msg.innerText = 'กรุณากรอกข้อมูล'; return; }
            msg.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ตรวจสอบ...';
            try {
                const res = await fetch(API_URL, { method: 'POST', redirect: 'follow', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({action:'login', username:u, password:p}) });
                const d = await res.json();
                if(d.status === 'success') {
                    saveSession(d.user);
                    location.reload(); 
                } else { msg.innerHTML = `รหัสผ่านไม่ถูกต้อง`; msg.style.color = 'var(--danger)'; }
            } catch(e) { msg.innerText = 'เชื่อมต่อล้มเหลว'; msg.style.color = 'var(--danger)'; }
        }

        function saveSession(user) {
            currentUser = user;
            localStorage.setItem('kamky_user', JSON.stringify(currentUser));
            let sessions = JSON.parse(localStorage.getItem('kamky_saved_sessions') || "[]");

        function showAllContracts() {
            if(!currentTrackingData || currentTrackingData.length === 0) { alert('กำลังโหลดข้อมูล...'); return; }
            isSearchMode = true;
            document.getElementById('statContainer').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'none';
            document.getElementById('polygonContainer').style.display = 'none';
            document.getElementById('searchResultTitle').style.display = 'block';
            document.getElementById('contractListHeading').style.display = 'none';
            document.getElementById('txtSearchKeyword').innerText = `สัญญาทั้งหมด (${currentTrackingData.length} รายการ) - เรียงตามสถานะ`;
            let sortedData = [...currentTrackingData].sort((a, b) => {
                const getPriority = (c) => {
                    const isClosed = (c.status === 'Paid' || c.status === 'Close' || c.status === 'Cancel');
                    const isBadDebt = (c.overdue_count >= 3); 
                    if (isBadDebt) return 4; if (isClosed) return 3; if (c.overdue_count > 0) return 2; return 1; 
                }; return getPriority(a) - getPriority(b);
            });
            filteredData = sortedData.map(c => {
                let amt = parseFloat(c.amount || 0) * (c.overdue_count > 1 ? c.overdue_count : 1);
                let statusSuffix = "";
                if (c.overdue_count >= 3) statusSuffix = " (หนี้เสีย)";
                else if (c.status === 'Paid' || c.status === 'Close') statusSuffix = " (ปิดยอด)";
                else if (c.status === 'Cancel') statusSuffix = " (ยกเลิก)";
                else if (c.overdue_count > 0) statusSuffix = ` (ค้าง ${c.overdue_count})`;
                else statusSuffix = " (ปกติ)";
                return { ...c, b_name: `${c.b_name} <span style="font-size:12px; font-weight:bold; color:${statusSuffix.includes('ปกติ')?'var(--success)':(statusSuffix.includes('ปิด')||statusSuffix.includes('ยกเลิก')?'var(--gray)':'var(--danger)')}">${statusSuffix}</span>`, finalAmount: amt, hasPostpone: (c.postpone_date && c.postpone_date !== "-" && c.postpone_date !== "") };
            });
            renderDirectList(filteredData);
        }

        function renderDashboard(data, selectedDate, forceShowAll) {
            const container = document.getElementById('contractList'); 
            const polyContainer = document.getElementById('polygonContainer');
            globalSummary = data.summary || {};
            container.innerHTML = ""; polyContainer.innerHTML = "";
            document.getElementById('contractListHeading').style.display = 'none';
            filteredData = [];
            const hidden = JSON.parse(localStorage.getItem('hiddenContracts') || '[]').map(String);
            const selectedDateThai = selectedDate ? formatDateToThai(selectedDate) : "";
            let selectedYearTH = ""; let selectedMonthOnly = "";
            if(selectedDate) { let d = new Date(selectedDate); selectedYearTH = d.getFullYear() + 543; selectedMonthOnly = ("0" + (d.getMonth() + 1)).slice(-2); }
            const selectedMonthStr = `${selectedYearTH}-${selectedMonthOnly}`; 
            contractGroups = { pending: [], normal: [], postpone: [], overdue: [] };
            let strictDailyCollected = 0; let strictMonthlyCollected = 0;
            const dashboard = document.getElementById('adminDashboard');
            const boxCost = document.getElementById('boxCost');     
            const cardDaily = document.getElementById('cardDaily'); 
            dashboard.style.display = 'grid'; 
            if (currentUser && currentUser.role === 'admin') {
                boxCost.style.display = 'block';
                dashboard.style.gridTemplateColumns = '1fr 1fr';
                if(cardDaily) cardDaily.style.display = 'block';
            } else {
                boxCost.style.display = 'none';
                dashboard.style.gridTemplateColumns = '1fr';
                if(cardDaily) cardDaily.style.display = 'none';
            }
            if (data.contracts) {
                data.contracts.forEach(c => {
                    const amount = parseFloat(c.amount || 0);
                    const isPaid = ['Paid', 'Close', 'รอปิดยอด', 'Cancel'].includes(c.status);
                    const isPostponedToToday = (c.postpone_date === selectedDateThai);
                    const isDueToday = (c.due_date === selectedDateThai);
                    const hasPostpone = (c.postpone_date && c.postpone_date !== "-" && c.postpone_date !== "");
                    const isPendingStatus = ['Pending_Approve', 'รอตรวจสอบ', 'รอปิดยอด'].includes(c.status);
                    let isTargetToday = (isPostponedToToday) || (isDueToday && !hasPostpone);
                    if (isTargetToday && isPaid && c.status !== 'Cancel') strictDailyCollected += amount;
                    if (c.due_date) { const parts = c.due_date.split('/'); if(parts.length === 3) { const cMonthStr = `${parts[2]}-${parts[1]}`; if (cMonthStr === selectedMonthStr && isPaid && c.status !== 'Cancel') strictMonthlyCollected += amount; } }
                    if (hidden.includes(String(c.c_no))) return;
                    if (isPaid) return; 
                    let amt = parseFloat(c.amount) * (c.overdue_count > 1 ? c.overdue_count : 1);
                    if (c.original_due_date !== selectedDateThai && c.postpone_date === selectedDateThai) { c.worksheetStatus = `เลื่อนมาจาก ${c.original_due_date}`; } else { if (isPendingStatus) { c.worksheetStatus = c.status === 'รอปิดยอด' ? 'รอปิดยอด' : 'รอตรวจสอบ'; } else { c.worksheetStatus = c.overdue_count > 0 ? 'ค้างชำระ' : 'ปกติ'; } }
                    let item = { ...c, finalAmount: amt, hasPostpone: hasPostpone };
                    filteredData.push(item);
                    if (isPendingStatus) { if (currentUser.role === 'admin' || !isPendingStatus) contractGroups.pending.push(item); } 
                    else if (isPostponedToToday) { contractGroups.postpone.push(item); }
                    else if (c.overdue_count > 0) { contractGroups.overdue.push(item); } 
                    else if (isTargetToday) { contractGroups.normal.push(item); }
                });
            }
            updateCharts(0, strictDailyCollected, 0, strictMonthlyCollected);
            if (data.summary && data.summary.commission !== undefined) { const commEl = document.getElementById('txtCommission'); if(commEl) commEl.innerText = (data.summary.commission || 0).toLocaleString(); }
            if (contractGroups.pending.length > 0 && currentUser.role === 'admin') { polyContainer.innerHTML += createPolygonHtml('pending', 'รอตรวจสอบ', contractGroups.pending.length, 'poly-bg-pending', 'fas fa-clock'); }
            polyContainer.innerHTML += createPolygonHtml('normal', 'ปกติ (วันนี้)', contractGroups.normal.length, 'poly-bg-normal', 'fas fa-calendar-check');
            polyContainer.innerHTML += createPolygonHtml('postpone', 'เลื่อนนัด', contractGroups.postpone.length, 'poly-bg-postpone', 'fas fa-history');
            polyContainer.innerHTML += createPolygonHtml('overdue', 'เกินกำหนด', contractGroups.overdue.length, 'poly-bg-overdue', 'fas fa-exclamation-circle');
            container.innerHTML = `<div class="loading-state" style="padding:20px;">👈 คลิกที่กล่องสถานะด้านบนเพื่อดูรายการ</div>`;
        }

        function createPolygonHtml(groupKey, title, count, bgClass, iconClass) { return `<div class="polygon-card ${bgClass}" onclick="showGroupList('${groupKey}', '${title}')"><i class="${iconClass} poly-icon"></i><div class="poly-count">${count}</div><div class="poly-title">${title}</div></div>`; }
        function showGroupList(groupKey, title) {
            const list = contractGroups[groupKey];
            const container = document.getElementById('contractList');
            const heading = document.getElementById('contractListHeading');
            heading.style.display = 'block';
            heading.innerText = `▼ รายการ: ${title} (${list.length})`;
            renderDirectList(list);
            setTimeout(() => { heading.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
        }
        function renderDirectList(items) {
            const container = document.getElementById('contractList');
            if (!items || items.length === 0) { container.innerHTML = '<div class="loading-state">ไม่พบรายการ</div>'; return; }
            container.innerHTML = items.map(c => createCardHtml(c)).join('');
        }

        function createCardHtml(c) {
            if (c.finalAmount === undefined) { c.finalAmount = parseFloat(c.amount || 0) * (c.overdue_count > 1 ? c.overdue_count : 1); }
            if (c.hasPostpone === undefined) { c.hasPostpone = (c.postpone_date && c.postpone_date !== "-" && c.postpone_date !== ""); }
            const isAdmin = currentUser.role === 'admin'; 
            let cardClass = isSearchMode ? "card-search-result" : "card-normal"; 
            let statusHtml = `<span class="status-text text-blue"><i class="fas fa-check-circle"></i> ปกติ</span>`;
            let hasPaymentNote = c.last_note && c.last_note.includes('แจ้งชำระ');
            const isClosed = (c.status === 'Paid' || c.status === 'Close');
            
            if (c.status === 'Pending_Approve' || c.status === 'รอตรวจสอบ') { 
                cardClass = "card-pending-approve"; 
                if(isAdmin) statusHtml = `<span class="status-text text-purple" onclick="adminApprove('${c.c_no}', ${c.row_index}, '${c.request_date}', '${c.last_note || ''}', 'postpone')">⏳ รอตรวจสอบ (กด)</span>`; 
                else statusHtml = `<span class="status-text text-purple">⏳ รอตรวจสอบ</span>`; 
            } 
            else if (c.status === 'รอปิดยอด') { 
                cardClass = "card-pending-approve"; 
                if(isAdmin) statusHtml = `<span class="status-text text-red" style="cursor:pointer;" onclick="adminApprove('${c.c_no}', ${c.row_index}, '-', '${c.last_note || ''}', 'close')">🏁 รอปิดยอด (กดอนุมัติ)</span>`; 
                else statusHtml = `<span class="status-text text-red">🏁 รออนุมัติปิดยอด</span>`; 
            }
            else if (c.hasPostpone) { cardClass = "card-postpone"; statusHtml = `<span class="status-text text-darkpurple">⏰ เลื่อน: ${c.postpone_date}</span>`; } 
            else if (c.overdue_count > 0) { cardClass = "card-overdue"; statusHtml = `<span class="status-text text-red">❗ ค้าง ${c.overdue_count} งวด</span>`; }
            else if (c.status === 'Cancel') { cardClass = "card-search-result"; statusHtml = `<span class="status-text" style="color:var(--gray);"><i class="fas fa-ban"></i> ยกเลิกสัญญาแล้ว</span>`; }
            else if (isClosed) { statusHtml = `<span class="status-text text-blue">✅ ปิดบัญชีแล้ว (${c.last_payment_date})</span>`; }
            
            if (hasPaymentNote) { let noteContent = linkify(c.last_note); statusHtml += `<div style="font-size:11px; color:var(--primary); background:#faf0f0; padding:6px; border-radius:4px; margin-top:4px; border:1px solid #e6b3b3; white-space:normal; word-break:break-all;">💰 ${noteContent}</div>`; }
            let financialHtml = '';
            let profitClass = c.current_profit >= 0 ? 'color:var(--success);' : 'color:var(--danger);'; 
            let profitIcon = c.current_profit >= 0 ? '📈 กำไร' : '📉 ยังไม่คืนทุน';
            let progressPercent = 0;
            if (c.product_cost > 0) { progressPercent = (c.total_revenue / c.product_cost) * 100; } else { progressPercent = 100; }
            if (progressPercent > 100) progressPercent = 100;
            financialHtml = `
                <div style="background:#f8f9fa; padding:8px; margin-top:10px; border-radius:8px; font-size:12px; border:1px solid #dfe6e9;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                        <span style="color:var(--gray);">ต้นทุน: ${parseInt(c.product_cost || 0).toLocaleString()}</span>
                        <span style="font-weight:bold; ${profitClass}">${profitIcon} ${parseInt(c.current_profit || 0).toLocaleString()}</span>
                    </div>
                    <div style="width:100%; background:#e0e6ed; height:6px; border-radius:3px; overflow:hidden;">
                        <div style="width:${progressPercent}%; background:${c.current_profit >= 0 ? 'var(--success)' : 'var(--warning)'}; height:100%;"></div>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:10px; color:var(--gray); margin-top:2px;">
                        <span>รับจริง: ${parseInt(c.total_revenue || 0).toLocaleString()}</span>
                        <span>ROI: ${c.roi_percent || 0}%</span>
                    </div>
                </div>`;
            let menuButton = isAdmin ? `<button class="btn-kebab" style="margin-left:5px;" onclick="openManageMenu(${c.row_index},'${c.b_name}','${c.c_no}')">⋮</button>` : '';
            let actionButtonsHtml = '', gridClass = '';
            const hasExtraInfo = (c.contact_image && c.contact_image !== "" && c.contact_image !== "-");
            const infoBtn = hasExtraInfo ? `<button class="btn-act btn-act-info" onclick="openContactImage('${c.c_no}')"><i class="fas fa-address-card"></i> ข้อมูล</button>` : `<button class="btn-act btn-disabled" disabled><i class="fas fa-address-card"></i> ข้อมูล</button>`;
            const contractBtn = `<button class="btn-act btn-act-contract" onclick="openContractPopup('${c.c_no}')"><i class="fas fa-file-contract"></i> สัญญา</button>`;
            if (isClosed || c.status === 'Cancel') {
                gridClass = 'grid-closed-actions';
                actionButtonsHtml = `${infoBtn}${contractBtn}`;
            } else {
                if (isAdmin) {
                    gridClass = 'grid-admin-actions';
                    actionButtonsHtml = `<a href="tel:${c.b_mobile}" class="btn-act btn-act-call"><i class="fas fa-phone"></i> โทร</a>${infoBtn}${contractBtn}<button class="btn-act btn-act-pay" onclick="openPay('${c.c_no}')"><i class="fas fa-wallet"></i> จ่าย</button><button class="btn-act btn-act-postpone" style="grid-column: 1 / -1;" onclick="openPostpone(${c.row_index},'${c.b_name}', '${c.postpone_date||''}')"><i class="fas fa-calendar-check"></i> นัดหมาย</button>`;
                } else {
                    gridClass = 'grid-user-actions';
                    const isPending = (c.status === 'Pending_Approve' || c.status === 'รอตรวจสอบ' || c.status === 'รอปิดยอด');
                    const payBtn = isPending ? `<button class="user-checkbox-btn btn-disabled" disabled><i class="fas fa-clock"></i> รออนุมัติ</button>` : `<button class="user-checkbox-btn" onclick="userReqPay('${c.c_no}')"><i class="far fa-check-square"></i> แจ้งชำระ</button>`;
                    const closeBtn = isPending ? `<button class="user-checkbox-btn btn-disabled" disabled><i class="fas fa-flag-checkered"></i> ปิดยอด</button>` : `<button class="user-checkbox-btn" onclick="userReqClose('${c.c_no}')" style="color:var(--danger);"><i class="fas fa-flag-checkered"></i> ขอปิดยอด</button>`;
                    const followBtn = isPending ? `<button class="user-checkbox-btn btn-disabled" disabled><i class="fas fa-bullhorn"></i> ติดตาม</button>` : `<button class="user-checkbox-btn" onclick="userReqFollow('${c.c_no}')" style="color:var(--dark);"><i class="fas fa-bullhorn"></i> ติดตาม</button>`;
                    actionButtonsHtml = `<a href="tel:${c.b_mobile}" class="btn-act btn-act-call"><i class="fas fa-phone"></i> โทร</a>${infoBtn}${contractBtn}${payBtn}<button class="user-checkbox-btn" onclick="userReqPostpone('${c.c_no}')"><i class="far fa-clock"></i> เลื่อนนัด</button>${followBtn}${closeBtn}<button class="user-checkbox-btn" style="grid-column: 1 / -1;" onclick="userAddNote('${c.c_no}')"><i class="fas fa-pen"></i> หมายเหตุ</button>`;
                }
            }
            return `<div class="cust-card ${cardClass}"><div class="cust-header"><div class="cust-info"><h3>${c.b_name}</h3><span class="cust-id">#${c.c_no}</span></div><div class="status-badge">${statusHtml}</div>${menuButton}</div><div class="cust-body"><div><div class="contact-line"><i class="fas fa-phone"></i> ${c.b_mobile}</div><div class="contact-line">งวดที่ ${c.installment_no}</div></div><div style="text-align:right"><span style="font-size:10px; color:var(--gray);">ยอดชำระ</span><div class="amount-val">฿${c.finalAmount.toLocaleString()}</div></div></div> ${financialHtml} <div class="cust-actions ${gridClass}">${actionButtonsHtml}</div></div>`;
        }

        async function userReqPay(cNo) { /* คงฟังก์ชันเดิม */ }
        async function userReqClose(cNo) { /* คงฟังก์ชันเดิม */ }
        async function userReqPostpone(cNo) { Swal.fire({title:'ขอเลื่อนนัด', input:'date'}).then(r=>{if(r.value) sendUserRequest('request_postpone', cNo, {new_date:r.value});}); }
        async function userAddNote(cNo) { Swal.fire({input:'text', title:'บันทึก'}).then(r=>{if(r.value) sendUserRequest('add_daily_note', cNo, {note:r.value});}); }
        async function sendUserRequest(act, cNo, pl) { Swal.showLoading(); try { await fetch(API_URL, { method:'POST', body:JSON.stringify({ action:'user_action_log', sub_action:act, c_no:cNo, user:currentUser.username, ...pl }) }); Swal.fire({icon:'success', title:'บันทึกสำเร็จ', timer:1500, showConfirmButton:false}); loadData(); } catch(e) { Swal.fire('Error', 'ส่งข้อมูลล้มเหลว', 'error'); } }

        async function adminApprove(cNo, rowIndex, reqDate, details, type) { /* คงฟังก์ชันเดิม */ }
        function openPostpone(idx, name, currentVal) { Swal.fire({ title: 'จัดการนัดหมาย', html: `<div style="margin-bottom:10px; color:var(--dark);">เดิม: <b>${currentVal || '-'}</b></div><input type="date" id="swal-date" class="swal2-input">`, showDenyButton: true, showCancelButton: true, confirmButtonText: 'บันทึก', denyButtonText: 'ลบนัดหมาย', cancelButtonText: 'ปิด', confirmButtonColor: '#800000' }).then(r => { if (r.isConfirmed) executeAction({ action: 'postpone', row_index: idx, new_date: document.getElementById('swal-date').value }); else if (r.isDenied) executeAction({ action: 'postpone', row_index: idx, new_date: '' }); }); }
        
        async function openContractPopup(cNo) { /* คงฟังก์ชันเดิม */ }
        async function openContactImage(cNo) { /* คงฟังก์ชันเดิม */ }
        function formatDateToThai(dateString) { if(!dateString) return ""; const p = dateString.split('-'); let year = parseInt(p[0]) + 543; return `${p[2]}/${p[1]}/${year}`; }
        
        function updateCharts(dailyTarget, dailyCollected, monthlyTarget, monthlyCollected) { 
            if (globalSummary) {
                if (globalSummary.daily_collected !== undefined) { dailyCollected = globalSummary.daily_collected; }
                if (globalSummary.commission_breakdown && globalSummary.commission_breakdown.revenue !== undefined) { monthlyCollected = globalSummary.commission_breakdown.revenue; }
                document.getElementById('txtTodayCollected').innerText = dailyCollected.toLocaleString(); 
                if (document.getElementById('txtTotalCost')) { let cost = globalSummary.total_cost || 0; document.getElementById('txtTotalCost').innerText = cost.toLocaleString(); }
                if (document.getElementById('txtNetProfit')) { let profit = globalSummary.net_profit || 0; let profitEl = document.getElementById('txtNetProfit'); profitEl.innerText = profit.toLocaleString(); if (profit < 0) { profitEl.style.color = "var(--danger)"; } else { profitEl.style.color = "var(--success)"; } }
            }
            if (globalSummary && globalSummary.commission !== undefined) { const commEl = document.getElementById('txtCommission'); if(commEl) { commEl.innerText = (globalSummary.commission || 0).toLocaleString(); } }
        }

        function exportToExcel() { if (!filteredData.length) return Swal.fire('ไม่มีข้อมูล', 'กรุณาค้นหาหรือเลือกวันที่ก่อน', 'warning'); let csv = "data:text/csv;charset=utf-8,\uFEFFลำดับ,เลขสัญญา,ชื่อ,เบอร์,งวด,ยอด,สถานะ\n"; filteredData.forEach((i, idx) => csv += `${idx+1},"${i.c_no}","${i.b_name}","${i.b_mobile}",${i.installment_no},${i.finalAmount},"${i.status}"\n`); const link = document.createElement("a"); link.href = encodeURI(csv); link.download = "Report.csv"; link.click(); }
        function openPay(c_no) { window.open(`https://kamkywork.github.io/kamkybill-app/?ref=${encodeURIComponent(c_no)}`, '_blank'); }
        
        async function openManageMenu(idx, name, c_no) { /* คงฟังก์ชันเดิม */ }
        async function executeAction(p) { Swal.fire({ title: 'บันทึก...', didOpen: () => Swal.showLoading() }); try { await fetch(API_URL, { method: 'POST', body: JSON.stringify(p) }); Swal.fire({ icon: 'success', title: 'สำเร็จ', timer: 1000, showConfirmButton: false }); loadData(); } catch (e) { Swal.fire('Error', 'ผิดพลาด', 'error'); } }
        function userProfile() { Swal.fire({ title: 'ข้อมูลผู้ใช้', html: `<b>${currentUser.name}</b><br>สถานะ: ${currentUser.role}`, showDenyButton: true, confirmButtonText: 'เปลี่ยนรหัสผ่าน', denyButtonText: 'ปิด' }).then(r => { if(r.isConfirmed) changePass(); }); }
        async function changePass() { const { value: p } = await Swal.fire({ title: 'ตั้งรหัสใหม่', input: 'password' }); if(p) { await fetch(API_URL, { method:'POST', body:JSON.stringify({action:'change_password', username:currentUser.username, new_pass:p}) }); Swal.fire('สำเร็จ'); } }

        function printReport() { /* คงฟังก์ชันเดิม */ }
		function showShopTransferReport() { /* คงฟังก์ชันเดิม */ }
        async function userReqFollow(cNo) { /* คงฟังก์ชันเดิม */ }
    </script>
</body>
