<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notty Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            /* พื้นหลังสีแดงไล่เฉดเข้ม ดูพรีเมียม */
            background: linear-gradient(135deg, #4a0000 0%, #8b0000 50%, #b30000 100%); 
            background-attachment: fixed;
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .header-container {
            text-align: center;
            margin-bottom: 35px;
        }
        h1 { 
            color: #ffffff; 
            font-size: 22px;
            font-weight: 600;
            margin: 0; 
            letter-spacing: 0.5px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .menu-container {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 15px; /* ระยะห่างระหว่างการ์ด */
        }
        .menu-card { 
            background: #ffffff; 
            padding: 16px 20px; 
            border-radius: 16px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.15); 
            text-decoration: none; 
            display: flex; 
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease; 
        }
        /* แถบสีด้านซ้ายแบบมินิมอล */
        .menu-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            transition: all 0.3s ease;
        }
        .menu-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        }
        .menu-card:hover::before {
            width: 6px; /* ขยายแถบสีนิดหน่อยเมื่อโฮเวอร์ */
        }
        .menu-card:active { 
            transform: scale(0.97); 
        }
        .icon-box { 
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px; 
            flex-shrink: 0;
        }
        .text-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .title { 
            font-size: 16px; 
            font-weight: 600; 
            color: #2c3e50;
            margin-bottom: 2px;
        }
        .desc { 
            font-size: 13px; 
            color: #888; 
            font-weight: 300;
        }

        /* คุมโทนสีแดง 3 ระดับ สำหรับแต่ละเมนู */
        .card-1::before { background: #ff4d4d; }
        .card-1 .icon-box { color: #ff4d4d; background: rgba(255, 77, 77, 0.1); }
        
        .card-2::before { background: #d32f2f; }
        .card-2 .icon-box { color: #d32f2f; background: rgba(211, 47, 47, 0.1); }
        
        .card-3::before { background: #990000; }
        .card-3 .icon-box { color: #990000; background: rgba(153, 0, 0, 0.1); }
    </style>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#8b0000">
</head>
<body>

    <div class="header-container">
        <h1><i class="fas fa-layer-group" style="margin-right: 8px;"></i>Notty System</h1>
    </div>

    <div class="menu-container">
        
		<a href="contract.html" class="menu-card card-3">
            <div class="icon-box"><i class="fas fa-file-contract"></i></div>
            <div class="text-content">
                <span class="title">จัดการสัญญา</span>
                <span class="desc">Contract Management</span>
            </div>
        </a>
		
		<a href="follow.html" class="menu-card card-1">
            <div class="icon-box"><i class="fas fa-chart-pie"></i></div>
            <div class="text-content">
                <span class="title">ระบบติดตามยอด</span>
                <span class="desc">Collection System</span>
            </div>
        </a>

        <a href="bill.html" class="menu-card card-2">
            <div class="icon-box"><i class="fas fa-receipt"></i></div>
            <div class="text-content">
                <span class="title">ออกใบเสร็จรับเงิน</span>
                <span class="desc">Issue Receipt & Verify Slip</span>
            </div>
        </a>
        
    </div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('./sw.js').then(function(registration) {
        console.log('ServiceWorker registration successful with scope: ', registration.scope);
      }, function(err) {
        console.log('ServiceWorker registration failed: ', err);
      });
    });
  }
</script>
</body>
</html>
